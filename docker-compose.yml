services:
  triage:
    image: itsm16/new-triage:latest
    deploy:
      replicas: 2
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - triage-network

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - triage
    networks:
      - triage-network

networks:
  triage-network:

volumes:
  caddy_data:
  caddy_config: